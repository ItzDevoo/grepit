name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            npm_pkg: grep4ai-win32-x64
            binary: grep4ai.exe
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            npm_pkg: grep4ai-linux-x64
            binary: grep4ai
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            npm_pkg: grep4ai-linux-arm64
            binary: grep4ai
          - target: x86_64-apple-darwin
            os: macos-latest
            npm_pkg: grep4ai-darwin-x64
            binary: grep4ai
          - target: aarch64-apple-darwin
            os: macos-latest
            npm_pkg: grep4ai-darwin-arm64
            binary: grep4ai

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Set Cargo version from git tag
        shell: bash
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          sed -i'' -e "s/^version = \".*\"/version = \"$VERSION\"/" Cargo.toml

      - name: Install cross-compilation tools
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc

      - name: Prepare npm package
        shell: bash
        run: |
          mkdir -p npm/${{ matrix.npm_pkg }}/bin
          cp target/${{ matrix.target }}/release/${{ matrix.binary }} npm/${{ matrix.npm_pkg }}/bin/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.npm_pkg }}
          path: npm/${{ matrix.npm_pkg }}

      # Also upload the raw binary for GitHub Releases
      - name: Create release archive
        shell: bash
        run: |
          mkdir -p release
          cp target/${{ matrix.target }}/release/${{ matrix.binary }} release/
          cd release
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            7z a ../grep4ai-${{ matrix.target }}.zip ${{ matrix.binary }}
          else
            tar czf ../grep4ai-${{ matrix.target }}.tar.gz ${{ matrix.binary }}
          fi

      - name: Upload release archive
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.target }}
          path: grep4ai-${{ matrix.target }}.*

  publish-github:
    name: GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: release-*
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: grep4ai-*
          generate_release_notes: true

  publish-npm:
    name: Publish to npm
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      # Copy built binaries into npm package dirs
      - name: Prepare packages
        run: |
          for pkg in grep4ai-win32-x64 grep4ai-linux-x64 grep4ai-linux-arm64 grep4ai-darwin-x64 grep4ai-darwin-arm64; do
            cp -r artifacts/$pkg/bin npm/$pkg/
            chmod +x npm/$pkg/bin/* 2>/dev/null || true
          done

      # Extract version from tag
      - name: Get version
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      # Update versions in all package.json files
      - name: Update versions
        run: |
          VERSION=${{ steps.version.outputs.version }}
          for dir in npm/grep4ai npm/grep4ai-win32-x64 npm/grep4ai-linux-x64 npm/grep4ai-linux-arm64 npm/grep4ai-darwin-x64 npm/grep4ai-darwin-arm64; do
            cd $dir
            npm version $VERSION --no-git-tag-version --allow-same-version
            cd $GITHUB_WORKSPACE
          done
          # Also update optionalDependencies versions in main package
          cd npm/grep4ai
          node -e "
            const pkg = require('./package.json');
            for (const dep of Object.keys(pkg.optionalDependencies || {})) {
              pkg.optionalDependencies[dep] = '$VERSION';
            }
            require('fs').writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "

      # Publish platform packages first, then the main package
      - name: Publish platform packages
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          for dir in npm/grep4ai-win32-x64 npm/grep4ai-linux-x64 npm/grep4ai-linux-arm64 npm/grep4ai-darwin-x64 npm/grep4ai-darwin-arm64; do
            cd $dir
            npm publish --access public --provenance || echo "Already published, skipping"
            cd $GITHUB_WORKSPACE
          done

      - name: Publish main package
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          cd npm/grep4ai
          npm publish --access public --provenance
